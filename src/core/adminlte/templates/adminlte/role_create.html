{% extends 'admin_base.html' %}

{% block title %}Нова роль{% endblock %}

{% block content %}
<section class="content-header">
    <h1>Нова роль</h1>
    <ul class="breadcrumb">
        <li><a href="{% url 'adminlte:statistic' %}"><i class="fa fa-home"></i> Головна</a></li>
        <li><a href="{% url 'adminlte:roles_update' %}">Ролі</a></li>
        <li class="active">Нова роль</li>
    </ul>
</section>

<section class="content">
    <div class="row">
        <div class="col-md-6">
            <div class="box box-primary">
                <div class="box-header with-border">
                    <h3 class="box-title">Створення ролі</h3>
                </div>

                <form method="post">
                    {% csrf_token %}
                    <div class="box-body">
                        <div class="form-group {% if form.name.errors %}has-error{% endif %}">
                            <label>Назва ролі</label>
                            <input type="text" name="name" class="form-control" required placeholder="Наприклад: Менеджер">
                            {% if form.name.errors %}
                                <span class="help-block">{{ form.name.errors|join:", " }}</span>
                            {% endif %}
                        </div>
                    </div>

                    <div class="box-footer text-right">
                        <a href="{% url 'adminlte:roles_update' %}" class="btn btn-default">Скасувати</a>
                        <button type="submit" class="btn btn-success">Створити</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
