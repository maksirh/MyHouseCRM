{% extends 'admin_base.html' %}
{% load static %}

{% block title %}Новий власник{% endblock %}

{% block content %}
<section class="content-header">
    <h1>Новий власник квартири</h1>
</section>

<section class="content">
    <div class="box box-primary">
        <div class="box-body">

            {% if form.errors %}
    <div class="alert alert-danger">
        <h4><i class="icon fa fa-ban"></i> Помилка валідації!</h4>
        {{ form.errors }}
    </div>
{% endif %}
            <form id="owner-form" method="post">
                {% csrf_token %}

                <div class="row">
                    <div class="col-xs-12 col-md-6">
                        <div class="form-group">
                            <label>Прізвище</label>
                            <input type="text" class="form-control" name="last_name" required value="{{ form.last_name.value|default:'' }}">
                        </div>
                        <div class="form-group">
                            <label>Ім'я</label>
                            <input type="text" class="form-control" name="first_name" required value="{{ form.first_name.value|default:'' }}">
                        </div>
                        <div class="form-group">
                            <label>По батькові (Surname)</label>
                            <input type="text" class="form-control" name="surname" value="{{ form.surname.value|default:'' }}">
                        </div>
                        <div class="form-group">
                            <label>Телефон</label>
                            <input type="text" class="form-control" name="phone_number" value="{{ form.phone_number.value|default:'' }}">
                        </div>
                    </div>

                    <div class="col-xs-12 col-md-6">
                        <div class="form-group">
                            <label>Email (Логін)</label>
                            <input type="email" class="form-control" name="email" required value="{{ form.email.value|default:'' }}">
                        </div>
                        <div class="form-group">
                            <label>Статус</label>
                            <select class="form-control" name="status">
                                <option value="active">Активний</option>
                                <option value="new">Новий</option>
                                <option value="disabled">Відключений</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Пароль</label>
                            <input type="password" class="form-control pass-value" id="pass1" name="password">
                        </div>
                        <div class="form-group">
                            <label>Повторити пароль</label>
                            <input type="password" class="form-control pass-value" id="pass2" name="password_confirm">
                        </div>
                    </div>
                </div>

                <div class="row margin-top-20">
                    <div class="col-xs-12 text-right">
                        <a href="{% url 'adminlte:owners_list' %}" class="btn btn-default">Скасувати</a>
                        <button type="submit" class="btn btn-success">Зберегти власника</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
