version: '3.8'

services:
  db:
    build:
      context: .
      dockerfile: deploy/db/Dockerfile
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    restart: always
    env_file:
      - local.env

  web:
    build:
      context: .
      dockerfile: deploy/backend/Dockerfile
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    depends_on:
      - db
    restart: always
    env_file:
      - local.env

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/static
      - media_volume:/app/media
    depends_on:
      - web
    restart: always

volumes:
  postgres_data:
  static_volume:
  media_volume:
